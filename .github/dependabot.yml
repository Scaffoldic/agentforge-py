version: 2
updates:
  # Keep GitHub Actions in CI / release workflows current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "ci"

  # Python dependencies across the uv workspace. uv uses standard
  # pyproject.toml metadata, which Dependabot's pip ecosystem reads.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
