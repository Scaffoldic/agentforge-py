name: Release

# Publish every workspace package to PyPI. Triggered when a vX.Y.Z
# tag is pushed to the repo.
#
# Auth: PyPI Trusted Publishing (OIDC) via the `id-token: write`
# permission on the publish job below — no long-lived API token.
# Every one of the 34 workspace projects has a Trusted Publisher
# configured (Owner=Scaffoldic, Repository=agentforge-py,
# Workflow=release.yml, Environment=pypi). The former hybrid
# `PYPI_API_TOKEN` secret + `password:` input were removed once
# the OIDC migration completed (2026-06-10).
#
# The `pypi` GitHub environment (Settings → Environments → New
# environment → "pypi") should be configured with required
# reviewers so each release run pauses for a manual "Approve"
# click before the upload step runs. That gate is the human
# safety net between cutting a tag and PyPI accepting the upload.

on:
  push:
    tags: ["v*"]
  # Allow manual runs from the Actions tab without a new tag,
  # for re-publishing a failed run on the same git ref.
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (defaults to current branch)"
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build wheels + sdists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Build every workspace member
        run: uv build --all --out-dir dist/
      - name: List built artefacts
        run: ls -la dist/
      - name: Upload artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  packaged-e2e:
    name: Packaged-wheel E2E gate
    needs: [build]
    runs-on: ubuntu-latest
    # Install the freshly-built wheels into a clean venv and run the
    # real CLI end-to-end (scaffold + config validate + add module).
    # Catches packaging bugs — missing templates, entry points, or
    # module data — BEFORE the publish job can run. See
    # scripts/packaged_e2e.py.
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Download build artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Run packaged-wheel E2E against the built artefacts
        run: uv run --no-project python scripts/packaged_e2e.py --skip-build --dist dist

  publish:
    name: Publish to PyPI
    needs: [build, packaged-e2e]
    runs-on: ubuntu-latest
    # The `pypi` environment gates this job on a manual approve
    # click (configured in Settings → Environments → pypi).
    environment:
      name: pypi
      url: https://pypi.org/project/agentforge-py/
    permissions:
      # id-token: write is required for Trusted Publishing OIDC.
      id-token: write
      contents: read
    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Skip duplicates so re-running on a partial-failure tag
          # doesn't 400 on packages that already uploaded.
          skip-existing: true
          # Trusted Publishing (OIDC): no `password:` input — the
          # action authenticates via the `id-token: write`
          # permission on this job.
