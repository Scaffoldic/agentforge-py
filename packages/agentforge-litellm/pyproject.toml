# agentforge-litellm — LiteLLM router-based provider for AgentForge.
#
# Tier-3 module per ADR-0003. Registers under
# `agentforge.providers:litellm`. Production runner wraps
# `litellm.acompletion` under `# pragma: no cover`; unit tests
# inject a fake runner.
#
# Use this when you want a single AgentForge agent that can route
# requests to 100+ underlying providers via LiteLLM's unified
# interface — without writing a per-provider sister package.

[project]
name = "agentforge-litellm"
version = "0.2.0"
description = "LiteLLM router-based LLM provider for AgentForge — 100+ underlying providers through one interface"
readme = "README.md"
requires-python = ">=3.13"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    {name = "The AgentForge Authors"},
]
keywords = ["ai", "agent", "llm", "litellm", "router"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "agentforge-core",
]

[project.optional-dependencies]
litellm = ["litellm>=1.50"]

[project.urls]
Homepage = "https://github.com/Scaffoldic/agentforge-py"
Repository = "https://github.com/Scaffoldic/agentforge-py"
Documentation = "https://github.com/Scaffoldic/agentforge-py"
Changelog = "https://github.com/Scaffoldic/agentforge-py/blob/main/CHANGELOG.md"
Issues = "https://github.com/Scaffoldic/agentforge-py/issues"

[project.entry-points."agentforge.providers"]
litellm = "agentforge_litellm:LiteLLMClient"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentforge_litellm"]

[tool.hatch.build.targets.sdist]
include = [
    "src/agentforge_litellm",
    "tests",
    "README.md",
    "LICENSE",
]
