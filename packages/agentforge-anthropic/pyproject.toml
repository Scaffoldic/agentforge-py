# agentforge-anthropic — Anthropic native LLM provider for AgentForge.
#
# Tier-3 module per ADR-0003. Registers as `agentforge.providers:anthropic`.
# Production runner wraps the `anthropic` Python SDK under
# `# pragma: no cover`; unit tests inject a fake runner that records
# every messages.create() call. Native Anthropic API (NOT via Bedrock —
# see `agentforge-bedrock` for the Bedrock variant) so users get
# direct access to the latest models, prompt caching, extended
# thinking, and streaming the day Anthropic releases them.

[project]
name = "agentforge-anthropic"
version = "0.2.0"
description = "Anthropic native LLM provider for AgentForge — Claude with caching, extended thinking, streaming"
readme = "README.md"
requires-python = ">=3.13"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    {name = "The AgentForge Authors"},
]
keywords = ["ai", "agent", "llm", "anthropic", "claude"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "agentforge-core",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]

[project.urls]
Homepage = "https://github.com/Scaffoldic/agentforge-py"
Repository = "https://github.com/Scaffoldic/agentforge-py"
Documentation = "https://github.com/Scaffoldic/agentforge-py"
Changelog = "https://github.com/Scaffoldic/agentforge-py/blob/main/CHANGELOG.md"
Issues = "https://github.com/Scaffoldic/agentforge-py/issues"

[project.entry-points."agentforge.providers"]
anthropic = "agentforge_anthropic:AnthropicClient"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentforge_anthropic"]

[tool.hatch.build.targets.sdist]
include = [
    "src/agentforge_anthropic",
    "tests",
    "README.md",
    "LICENSE",
]
