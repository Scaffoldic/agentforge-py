# agentforge-phoenix — Arize Phoenix dashboard for AgentForge.
#
# Tier-3 module per ADR-0003. Installs as `agentforge.hooks:phoenix`
# and logs each run + its steps to a Phoenix project. The production
# runner wraps Arize Phoenix's client SDK under `# pragma: no cover`.

[project]
name = "agentforge-phoenix"
version = "0.3.1"
description = "Arize Phoenix dashboard hook for AgentForge"
readme = "README.md"
requires-python = ">=3.13"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    {name = "The AgentForge Authors"},
]
keywords = ["ai", "agent", "observability", "phoenix", "arize"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Monitoring",
    "Typing :: Typed",
]

dependencies = [
    "agentforge-core ~= 0.3.1",
]

[project.optional-dependencies]
phoenix = ["arize-phoenix>=4.0"]

[project.urls]
Homepage = "https://github.com/Scaffoldic/agentforge-py"
Repository = "https://github.com/Scaffoldic/agentforge-py"
Changelog = "https://github.com/Scaffoldic/agentforge-py/blob/main/CHANGELOG.md"
Issues = "https://github.com/Scaffoldic/agentforge-py/issues"

[project.entry-points."agentforge.hooks"]
phoenix = "agentforge_phoenix:PhoenixHook"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentforge_phoenix"]

[tool.hatch.build.targets.sdist]
include = [
    "src/agentforge_phoenix",
    "tests",
    "README.md",
    "LICENSE",
]
