# agentforge-reranker-cohere — Cohere Rerank API for AgentForge.
#
# Tier-3 module per ADR-0003. Registers as
# `agentforge.rerankers:cohere`. Production runner wraps the
# `cohere` Python SDK under `# pragma: no cover`; unit tests
# inject a fake runner that records every rerank call.

[project]
name = "agentforge-reranker-cohere"
version = "0.2.2"
description = "Cohere managed-API reranker for AgentForge"
readme = "README.md"
requires-python = ">=3.13"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    {name = "The AgentForge Authors"},
]
keywords = ["ai", "agent", "rag", "rerank", "cohere"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]

dependencies = [
    "agentforge-core ~= 0.2.2",
]

[project.optional-dependencies]
cohere = ["cohere>=5.0"]

[project.urls]
Homepage = "https://github.com/Scaffoldic/agentforge-py"
Repository = "https://github.com/Scaffoldic/agentforge-py"
Changelog = "https://github.com/Scaffoldic/agentforge-py/blob/main/CHANGELOG.md"
Issues = "https://github.com/Scaffoldic/agentforge-py/issues"

[project.entry-points."agentforge.rerankers"]
cohere = "agentforge_reranker_cohere:CohereReranker"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentforge_reranker_cohere"]

[tool.hatch.build.targets.sdist]
include = [
    "src/agentforge_reranker_cohere",
    "tests",
    "README.md",
    "LICENSE",
]
