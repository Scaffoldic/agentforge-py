# agentforge-reranker-voyage — Voyage AI Rerank API for AgentForge.

[project]
name = "agentforge-reranker-voyage"
version = "0.2.3"
description = "Voyage AI managed-API reranker for AgentForge"
readme = "README.md"
requires-python = ">=3.13"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    {name = "The AgentForge Authors"},
]
keywords = ["ai", "agent", "rag", "rerank", "voyage"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]

dependencies = [
    "agentforge-core ~= 0.2.3",
]

[project.optional-dependencies]
voyage = ["voyageai>=0.3"]

[project.urls]
Homepage = "https://github.com/Scaffoldic/agentforge-py"
Repository = "https://github.com/Scaffoldic/agentforge-py"
Changelog = "https://github.com/Scaffoldic/agentforge-py/blob/main/CHANGELOG.md"
Issues = "https://github.com/Scaffoldic/agentforge-py/issues"

[project.entry-points."agentforge.rerankers"]
voyage = "agentforge_reranker_voyage:VoyageReranker"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentforge_reranker_voyage"]

[tool.hatch.build.targets.sdist]
include = [
    "src/agentforge_reranker_voyage",
    "tests",
    "README.md",
    "LICENSE",
]
