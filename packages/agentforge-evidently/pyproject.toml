# agentforge-evidently — Evidently AI agent metrics + drift hook.
#
# Tier-3 module per ADR-0003. Installs as `agentforge.hooks:evidently`.
# Buffers per-step records in memory and writes an Evidently report
# to `report_dir` at the end of each run.

[project]
name = "agentforge-evidently"
version = "0.2.2"
description = "Evidently AI metrics + drift hook for AgentForge"
readme = "README.md"
requires-python = ">=3.13"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    {name = "The AgentForge Authors"},
]
keywords = ["ai", "agent", "observability", "evidently", "drift"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Monitoring",
    "Typing :: Typed",
]

dependencies = [
    "agentforge-core ~= 0.2.2",
]

[project.optional-dependencies]
evidently = ["evidently>=0.5"]

[project.urls]
Homepage = "https://github.com/Scaffoldic/agentforge-py"
Repository = "https://github.com/Scaffoldic/agentforge-py"
Changelog = "https://github.com/Scaffoldic/agentforge-py/blob/main/CHANGELOG.md"
Issues = "https://github.com/Scaffoldic/agentforge-py/issues"

[project.entry-points."agentforge.hooks"]
evidently = "agentforge_evidently:EvidentlyHook"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentforge_evidently"]

[tool.hatch.build.targets.sdist]
include = [
    "src/agentforge_evidently",
    "tests",
    "README.md",
    "LICENSE",
]
