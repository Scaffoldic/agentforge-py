# agentforge-chat-slack ŌĆö Slack reference channel adapter.
#
# Maps Slack `message` / `app_mention` events to `ChatSession.send`
# calls and streams the response back via `chat.update` API.
# Exemplar of the community pattern: how to wire a third-party
# messaging channel to AgentForge ŌĆö Telegram / Discord / Teams etc.
# would follow the same shape with different SDKs.

[project]
name = "agentforge-chat-slack"
version = "0.2.3"
description = "Slack reference channel adapter for AgentForge"
readme = "README.md"
requires-python = ">=3.13"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    {name = "The AgentForge Authors"},
]
keywords = ["ai", "agent", "chat", "slack", "channel-adapter"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Communications :: Chat",
    "Typing :: Typed",
]

dependencies = [
    "agentforge-core ~= 0.2.3",
    "agentforge-chat ~= 0.2.3",
    "slack-bolt>=1.20",
    "slack-sdk>=3.30",
]

[project.urls]
Homepage = "https://github.com/Scaffoldic/agentforge-py"
Repository = "https://github.com/Scaffoldic/agentforge-py"
Changelog = "https://github.com/Scaffoldic/agentforge-py/blob/main/CHANGELOG.md"
Issues = "https://github.com/Scaffoldic/agentforge-py/issues"

[project.entry-points."agentforge.chat.channel"]
slack = "agentforge_chat_slack:SlackChatAdapter"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentforge_chat_slack"]

[tool.hatch.build.targets.sdist]
include = [
    "src/agentforge_chat_slack",
    "tests",
    "README.md",
    "LICENSE",
]
