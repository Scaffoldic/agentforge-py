# agentforge-ollama — Ollama local LLM + embedding provider for AgentForge.
#
# Tier-3 module per ADR-0003. Registers under
# `agentforge.providers:ollama` and `agentforge.embeddings:ollama`.
# Production runner wraps the `ollama` Python SDK
# (`ollama.AsyncClient`) under `# pragma: no cover`; unit tests
# inject a fake runner.

[project]
name = "agentforge-ollama"
version = "0.2.4"
description = "Ollama local LLM + embedding provider for AgentForge — llama / mistral / qwen / mxbai-embed on localhost"
readme = "README.md"
requires-python = ">=3.13"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    {name = "The AgentForge Authors"},
]
keywords = ["ai", "agent", "llm", "ollama", "local"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "agentforge-core ~= 0.2.4",
]

[project.optional-dependencies]
ollama = ["ollama>=0.4"]

[project.urls]
Homepage = "https://github.com/Scaffoldic/agentforge-py"
Repository = "https://github.com/Scaffoldic/agentforge-py"
Documentation = "https://github.com/Scaffoldic/agentforge-py"
Changelog = "https://github.com/Scaffoldic/agentforge-py/blob/main/CHANGELOG.md"
Issues = "https://github.com/Scaffoldic/agentforge-py/issues"

[project.entry-points."agentforge.providers"]
ollama = "agentforge_ollama:OllamaClient"

[project.entry-points."agentforge.embeddings"]
ollama = "agentforge_ollama:OllamaEmbeddingClient"

[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentforge_ollama"]

[tool.hatch.build.targets.sdist]
include = [
    "src/agentforge_ollama",
    "tests",
    "README.md",
    "LICENSE",
]
